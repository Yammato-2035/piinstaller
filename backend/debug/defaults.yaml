# PI-Installer Debug Defaults – Schema v1
# Überschrieben durch: /etc/pi-installer/debug.config.yaml und ENV (PIINSTALLER_DEBUG_*)

global:
  enabled: true
  level: INFO
  sink:
    file:
      # Leer = Auto: /var/log/piinstaller/ wenn schreibbar (z. B. als root), sonst ~/.cache/piinstaller/logs/
      path: ""
  rotate:
    max_files: 10
    max_size_mb: 5
  retention:
    max_age_days: 7
  privacy:
    sanitize: true
    redact_patterns:
      - "password\\s*[=:]\\s*\\S+"
      - "token\\s*[=:]\\s*\\S+"
      - "psk\\s*[=:]\\s*\\S+"
      - "wpa_passphrase\\s*[=:]\\s*\\S+"
      - "Authorization\\s+Bearer\\s+\\S+"
  export:
    enabled: true
    include_system_snapshot: true
    include_recent_logs: true
    max_log_lines: 5000
    output_dir: /tmp/piinstaller-support

scopes:
  modules: {}

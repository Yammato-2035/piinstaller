[pytest]
# pytest-asyncio: sonst Deprecation in pytest_configure
asyncio_default_fixture_loop_scope = function

# Drittanbieter-Warnungen (FastAPI/Pydantic/httpx/Starlette) — nicht als Fehler werten
# Hinweis: Keine Backticks in Zeilen — sonst kann das INI-Parsing in CI fehlschlagen.
filterwarnings =
    ignore::pydantic.warnings.PydanticDeprecatedSince20
    ignore:.*general_plain_validator_function.*:DeprecationWarning
    ignore:The 'app' shortcut is now deprecated:DeprecationWarning
    ignore:There is no current event loop:DeprecationWarning
    ignore::PendingDeprecationWarning:starlette.formparsers

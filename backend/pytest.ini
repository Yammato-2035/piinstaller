[pytest]
# pytest-asyncio: Deprecation vermeiden (sonst bei strenger Warnbehandlung Abbruch in pytest_configure)
asyncio_default_fixture_loop_scope = function

# Bekannte Drittanbieter-Warnungen während Tests (FastAPI/Pydantic/httpx) — nicht als Fehler werten,
# damit CI bei PYTHONWARNINGS=error oder strenger Policy nicht mit Exit 1 abbricht.
filterwarnings =
    ignore::pydantic.warnings.PydanticDeprecatedSince20
    ignore:.*general_plain_validator_function.*:DeprecationWarning
    ignore:The 'app' shortcut is now deprecated:DeprecationWarning
    ignore:There is no current event loop:DeprecationWarning
    ignore:Please use `import python_multipart`:PendingDeprecationWarning

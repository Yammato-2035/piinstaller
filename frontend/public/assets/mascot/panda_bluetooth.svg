<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1025 1025" role="img" aria-labelledby="pandaBluetoothTitle">
  <title id="pandaBluetoothTitle">SetupHelfer Panda  Bluetooth</title>
  <defs>
    <clipPath id="pandaBluetoothFrame">
      <circle cx="512.5" cy="512.5" r="420" />
    </clipPath>
  </defs>
  <rect x="0" y="0" width="1025" height="1025" fill="#020617" />
  <g clip-path="url(#pandaBluetoothFrame)">
    <image href="./panda_base.svg" x="0" y="0" width="1025" height="1025" preserveAspectRatio="xMidYMid meet" />
  </g>
  <!-- Bluetooth-Symbol im Stil des UI, kein Fremd-Logo -->

    <circle cx="0" cy="0" r="70" fill="#0f172a" stroke="#38bdf8" stroke-width="6" />
    <path d="M-18 -40 L18 0 L-18 40 L-18 -40 Z" fill="none" stroke="#38bdf8" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />

# CI: Lint, Security-Scan, Tests bei Push/PR auf main
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff bandit pytest pytest-asyncio httpx

      - name: Ruff (Lint)
        run: ruff check . --output-format=github
        continue-on-error: true

      - name: Bandit (Security)
        run: bandit -r . -x ./venv,./.venv,./tests -ll
        continue-on-error: true

      - name: Pytest
        env:
          PI_INSTALLER_DEV: "1"
          # Org-/Runner-Default kann PYTHONWARNINGS=error setzen — für Tests zurücksetzen
          PYTHONWARNINGS: "default"
        run: |
          set -e
          test -f pytest.ini
          python -m pytest tests/ -v --tb=short -x

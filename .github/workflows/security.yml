# Security scans only – no code changes. Reports only.
name: Security

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"  # weekly Monday 06:00 UTC

permissions:
  contents: read

env:
  # Opt into Node 24 for JS-based actions (see GitHub Actions changelog, 2025-09-19).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  pip-audit:
    name: pip-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: false
      - name: Git safe directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install pip-audit
        run: pip install pip-audit
      # Nur echte Lieferketten-Risiken im Backend; Abhängigkeiten in requirements.txt halten OSV grün.
      - name: Run pip-audit (backend)
        run: pip-audit -r backend/requirements.txt

  npm-audit:
    name: npm-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: false
      - name: Git safe directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      # Nur Produktionsabhängigkeiten: Vite/esbuild/Rollup sind Build-/Dev-Tooling, nicht das ausgelieferte Bundle.
      - name: npm audit (frontend, production only)
        run: cd frontend && npm audit --omit=dev --audit-level=high

  semgrep:
    name: semgrep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: false
      - name: Git safe directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install Semgrep
        run: pip install semgrep
      # Nur ERROR-Schwere: INFO/WARNING-Regeln erzeugen oft False Positives in generischen auto-Regeln.
      - name: Semgrep scan
        run: semgrep scan --config auto --severity=ERROR
        continue-on-error: true

  secret-scan:
    name: secret-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: false
      - name: Git safe directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: Gitleaks (no code changes, report only)
        uses: gitleaks/gitleaks-action@v2.3.9
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

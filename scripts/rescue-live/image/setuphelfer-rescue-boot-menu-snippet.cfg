# Setuphelfer Rettungsstick — custom boot labels (included from live.cfg.in)
label setuphelfer-rescue-default
	menu label ^Setuphelfer Rettung starten
	menu default
	kernel @KERNEL@
	append initrd=@INITRD@ boot=live config @LB_BOOTAPPEND_LIVE@ setuphelfer_start_assistant=1

label setuphelfer-rescue-network
	menu label Setuphelfer Rettung mit Netzwerk-Assistent
	kernel @KERNEL@
	append initrd=@INITRD@ boot=live config @LB_BOOTAPPEND_LIVE@ setuphelfer_network_onboarding=1 setuphelfer_start_assistant=1

label setuphelfer-rescue-msi-compat
	menu label Setuphelfer MSI/NVIDIA-Kompatibilitaetsmodus
	kernel @KERNEL@
	append initrd=@INITRD@ boot=live config @LB_BOOTAPPEND_LIVE@ pci=noaer nomodeset setuphelfer_msi_compat=1

label setuphelfer-rescue-diagnose
	menu label Setuphelfer Diagnosemodus ohne Aenderungen
	kernel @KERNEL@
	append initrd=@INITRD@ boot=live config @LB_BOOTAPPEND_LIVE@ setuphelfer_diagnose=1 systemd.log_level=debug

label setuphelfer-rescue-toram
	menu label Setuphelfer Start in RAM / Media-Check
	kernel @KERNEL@
	append initrd=@INITRD@ boot=live config toram @LB_BOOTAPPEND_LIVE@ setuphelfer_media_check=1

label setuphelfer-rescue-reboot
	menu label ^Neustart
	COM32 reboot.c32

label setuphelfer-rescue-poweroff
	menu label ^Herunterfahren
	COM32 poweroff.c32

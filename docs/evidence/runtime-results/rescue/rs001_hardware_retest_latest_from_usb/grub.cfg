set timeout=10
set default=0
search --no-floppy --fs-uuid C9C8-394A --set=root
if [ -z "$root" ]; then
  search --no-floppy --label SETUPHELFER --set=root
fi
if [ -z "$root" ]; then
  set root=($cmdpath)
fi

menuentry "Setuphelfer Rettung starten" {
  linux /live/vmlinuz boot=live components quiet setuphelfer_rescue=1 setuphelfer_start_assistant=1
  initrd /live/initrd.img
}

menuentry "Setuphelfer Rettung starten - Netzwerk-Assistent" {
  linux /live/vmlinuz boot=live components setuphelfer.network=1 quiet setuphelfer_rescue=1 setuphelfer_start_assistant=1
  initrd /live/initrd.img
}

menuentry "Setuphelfer MSI/NVIDIA Kompatibilitaetsmodus" {
  linux /live/vmlinuz boot=live components pci=noaer nouveau.modeset=0 nomodeset quiet setuphelfer_rescue=1 setuphelfer_msi_compat=1
  initrd /live/initrd.img
}

menuentry "Setuphelfer Diagnosemodus" {
  linux /live/vmlinuz boot=live components systemd.unit=multi-user.target setuphelfer_rescue=1 setuphelfer_diagnose=1
  initrd /live/initrd.img
}

menuentry "Setuphelfer RAM-Modus / toram + Media-Check" {
  linux /live/vmlinuz boot=live components toram setuphelfer.media_check=1 quiet setuphelfer_rescue=1
  initrd /live/initrd.img
}

menuentry "Neustart" { reboot }
menuentry "Herunterfahren" { halt }

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pi-installer-backend
    # Backend intentionally not exposed to external network for security.
    # Only frontend (same network) can reach backend. Use "ports: - 8000:8000" for host access.
    expose:
      - "8000"
    volumes:
      - ./backend:/app
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - pi-network
    restart: unless-stopped

  frontend:
    image: node:18-alpine
    container_name: pi-installer-frontend
    working_dir: /app
    ports:
      - "3001:3001"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      # Browser (host) reaches backend; if backend only has "expose", add ports: - "8000:8000" for host access
      - VITE_API_URL=http://localhost:8000
    networks:
      - pi-network
    restart: unless-stopped
    depends_on:
      - backend
    command: sh -c "npm install && npm run dev"

networks:
  pi-network:
    driver: bridge
